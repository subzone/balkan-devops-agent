<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#4c51bf"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
  <circle cx="64" cy="64" r="42" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- 10 agent dots arranged in a circle (one per chat participant) -->
  <g>
    <!-- 0deg -->
    <circle cx="64" cy="14" r="4.2" fill="#48bb78"/>
    <!-- 36deg -->
    <circle cx="93.4" cy="23.5" r="4.2" fill="#9f7aea"/>
    <!-- 72deg -->
    <circle cx="111.5" cy="48.6" r="4.2" fill="#4299e1"/>
    <!-- 108deg -->
    <circle cx="111.5" cy="79.4" r="4.2" fill="#f56565"/>
    <!-- 144deg -->
    <circle cx="93.4" cy="104.5" r="4.2" fill="#a0aec0"/>
    <!-- 180deg -->
    <circle cx="64" cy="114" r="4.2" fill="#ecc94b"/>
    <!-- 216deg -->
    <circle cx="34.6" cy="104.5" r="4.2" fill="#ed8936"/>
    <!-- 252deg -->
    <circle cx="16.5" cy="79.4" r="4.2" fill="#38b2ac"/>
    <!-- 288deg -->
    <circle cx="16.5" cy="48.6" r="4.2" fill="#fbd38d"/>
    <!-- 324deg -->
    <circle cx="34.6" cy="23.5" r="4.2" fill="#fc8181"/>
  </g>

  <!-- Central chat bubble (the "agents speak" idea) -->
  <g filter="url(#soft)">
    <path d="M30 44
             Q30 34 40 34
             L88 34
             Q98 34 98 44
             L98 74
             Q98 84 88 84
             L62 84
             L50 96
             L50 84
             L40 84
             Q30 84 30 74
             Z"
          fill="url(#bubble)"/>
  </g>

  <!-- Terminal prompt ">_" inside bubble = DevOps/CLI vibe -->
  <g stroke="#2d3748" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="46,52 56,60 46,68"/>
    <line x1="62" y1="68" x2="82" y2="68"/>
  </g>
</svg>
